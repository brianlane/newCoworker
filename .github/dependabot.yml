version: 2
updates:
  # Root Next.js app
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/cloudflare/email-worker"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/vps/llm-router"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/vps/chat-worker"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/vps/voice-bridge"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # The bridge is built and tested against the @google/genai 1.x Gemini Live
      # API and 1.x is the current known-good runtime in production. The 2.x
      # major reworks the Live contract, which we have NOT migrated or validated
      # end-to-end on gemini-3.1-flash-live-preview. (Note: the "calls die right
      # after the greeting" outage was NOT the SDK major — root cause was the
      # bridge shipping odd-length PCM frames to Gemini Live, fixed in #259.)
      # Keep on 1.x; minor/patch updates still flow via the group above. Lift
      # this only as part of a deliberate, tested v2 Live migration.
      - dependency-name: "@google/genai"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/vps/aiflow-render"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
