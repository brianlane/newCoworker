version: 2
updates:
  # Root Next.js app
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # mcp-handler (latest: 1.1.0) peer-pins @modelcontextprotocol/sdk to
      # EXACTLY 1.26.0, so any SDK bump breaks `npm ci` with ERESOLVE (see
      # PR #820). Unignore once mcp-handler ships a release accepting a
      # newer SDK.
      - dependency-name: "@modelcontextprotocol/sdk"

  - package-ecosystem: npm
    directory: "/cloudflare/email-worker"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/vps/llm-router"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/vps/chat-worker"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/vps/voice-bridge"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    # No @google/genai major-version pin: the bridge now runs on the 2.x line.
    # The 2.0 breaking changes were Interactions-API only — the Gemini Live API
    # (ai.live.connect / sendRealtimeInput) and generateContent are unaffected
    # per the v2.0.0 changelog, and the bridge builds + runs against 2.x. (The
    # "calls die after the greeting" outage was the odd-length PCM bug, #259,
    # not the SDK major.) Major bumps now flow as their own PRs for review.

  - package-ecosystem: npm
    directory: "/vps/aiflow-render"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
