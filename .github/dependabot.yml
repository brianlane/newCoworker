version: 2
updates:
  # Root Next.js app
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/cloudflare/email-worker"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/vps/llm-router"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/vps/chat-worker"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/vps/voice-bridge"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # The bridge targets the @google/genai 1.x Gemini Live API. The 2.x major
      # changed the Live contract (sendClientContent is no longer used for
      # conversational turns on gemini-3.1-flash-live-preview — sendRealtimeInput
      # is required), which silently broke calls right after the greeting. Keep
      # on 1.x until the bridge is migrated to the v2 Live API.
      - dependency-name: "@google/genai"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/vps/aiflow-render"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
