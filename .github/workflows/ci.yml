name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"
  CI: "true"

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: mock_anon_key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: mock_anon_key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Next.js route types
        run: npx next typegen

      - name: Typecheck
        run: npx tsc --noEmit

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore

  deno-check:
    name: Edge Functions Typecheck (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.3

      # The repo-root `tsc --noEmit` EXCLUDES supabase/functions (it can't resolve
      # the Deno https:// URL imports), so app typecheck can't catch missing
      # exports / type breakage in the edge functions — exactly the class of bug
      # that boot-crashed ai-flow-worker in prod. `deno check` on each entrypoint
      # transitively type-checks the function and its _shared deps the same way
      # the Supabase CLI bundles them at deploy.
      - name: Type-check Supabase Edge functions
        run: deno check supabase/functions/*/index.ts

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (prod deps, high+)
        run: npm audit --omit=dev --audit-level=high

  # Live-AI end-to-end suite (tests/e2e/): real Gemini calls exercising the
  # reply-reasoning trailer round trip and full AiFlow executions where the
  # model makes the branch decisions — the contract class that unit tests
  # cannot cover (the Truly Insurance trailer leak of 2026-07-11 shipped
  # through 100%-coverage unit tests because only the live model mangles
  # markers).
  #
  # Runs LAST, twice-gated so the paid model calls fire only on an
  # otherwise-mergeable commit:
  #   1. `needs`: the five jobs in THIS workflow (free, event-driven);
  #   2. the e2e-gate step: polls until every OTHER check on the SHA —
  #      cross-workflow (Analyze/CodeQL/audit) and app-reported (Cursor
  #      Bugbot, GitGuardian, Vercel) — is literally SUCCESS (a NEUTRAL
  #      Bugbot means open findings and keeps the gate closed) AND every
  #      review thread is resolved. See .github/scripts/e2e-gate.sh.
  # Superseded pushes are cancelled by the workflow-level concurrency group.
  e2e:
    name: E2E (live AI + AiFlows)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, typecheck, test, deno-check, security]
    permissions:
      contents: read
      checks: read
      statuses: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Push events (post-merge main) skip the PR-shaped gate: Bugbot/Vercel/
      # threads exist on the PR, which already enforced all of this pre-merge.
      - name: Wait for every other check to pass and all threads to resolve
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/e2e-gate.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run live e2e suite
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "::error::GOOGLE_API_KEY secret is not available to this run — the e2e suite cannot call Gemini."
            exit 1
          fi
          npm run test:e2e
