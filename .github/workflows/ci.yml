name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"
  CI: "true"

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: mock_anon_key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: mock_anon_key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Next.js route types
        run: npx next typegen

      - name: Typecheck
        run: npx tsc --noEmit

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore

  deno-check:
    name: Edge Functions Typecheck (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.3

      # The repo-root `tsc --noEmit` EXCLUDES supabase/functions (it can't resolve
      # the Deno https:// URL imports), so app typecheck can't catch missing
      # exports / type breakage in the edge functions — exactly the class of bug
      # that boot-crashed ai-flow-worker in prod. `deno check` on each entrypoint
      # transitively type-checks the function and its _shared deps the same way
      # the Supabase CLI bundles them at deploy.
      - name: Type-check Supabase Edge functions
        run: deno check supabase/functions/*/index.ts

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (prod deps, high+)
        run: npm audit --omit=dev --audit-level=high

  # The REAL ai-flow-worker against a REAL local Postgres: `supabase start`
  # applies every migration (which keeps the migration ledger honest — the
  # duplicate-version drift this job's first run exposed broke local starts
  # repo-wide), `supabase functions serve` runs the actual worker bundle, and
  # the suite ticks it over HTTP exactly like pg_cron. Covers what the unit
  # and live-AI layers cannot: run claiming/reclaim, revision bumps,
  # wait_for_reply park + timeout RPCs, sleep deferrals, step persistence.
  worker-integration:
    name: Worker Integration (local Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality, typecheck, test, deno-check, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Pinned: `latest` (2.109.x) changed the `supabase status` output keys
      # and handed the suite a non-service key ("permission denied for table
      # businesses" on the first CI run). 2.78.1 is the version the suite was
      # validated against locally; bump deliberately, not implicitly.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      - name: Start local Supabase (applies all migrations)
        run: supabase start -x studio,imgproxy,mailpit,realtime,storage-api

      - name: Serve edge functions
        run: |
          # The sms-reply-pipeline suite runs a fake Rowboat (port 8977) on
          # THIS host; the edge-runtime container reaches it via the supabase
          # docker network's gateway IP (Linux). Locally on Docker Desktop
          # the same role is played by host.docker.internal — see the
          # vitest.worker-integration.config.ts header for the local recipe.
          NET=supabase_network_glwmorjxzkzpcfffwvkk
          GW=$(docker network inspect "$NET" -f '{{(index .IPAM.Config 0).Gateway}}' 2>/dev/null || true)
          if [ -z "$GW" ]; then
            # Some docker versions omit Gateway from IPAM — derive the host
            # address as .1 of the network's subnet (docker's convention).
            SUBNET=$(docker network inspect "$NET" -f '{{(index .IPAM.Config 0).Subnet}}' 2>/dev/null || true)
            GW=$(printf '%s' "$SUBNET" | sed -E 's#\.[0-9]+/[0-9]+$#.1#')
          fi
          [ -z "$GW" ] && GW=host.docker.internal
          echo "fake-rowboat host for containers: $GW"
          {
            echo "INTERNAL_CRON_SECRET=itest-cron-secret"
            echo "ROWBOAT_CHAT_URL_TEMPLATE=http://${GW}:8977/chat"
            echo "ROWBOAT_DEFAULT_PROJECT_ID=itest-project"
            echo "ROWBOAT_VPS_CHAT_BEARER=itest-rowboat-bearer"
          } > supabase/functions/.env.itest
          # --no-verify-jwt mirrors production: every function is deployed
          # with verify_jwt = false (see supabase/config.toml) because they
          # authenticate their own callers (the pg_cron bearer is plain hex,
          # not a JWT — the gateway check rejects it with "Invalid Token").
          (supabase functions serve --no-verify-jwt --env-file supabase/functions/.env.itest > /tmp/functions-serve.log 2>&1 &)
          # Ready when the worker answers (401 = up, auth working; retry ~60s).
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:54321/functions/v1/ai-flow-worker || true)
            if [ "$CODE" = "401" ]; then echo "functions ready"; exit 0; fi
            sleep 2
          done
          echo "::error::edge functions never came up"; cat /tmp/functions-serve.log; exit 1

      - name: Run worker integration suite
        run: |
          KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY // .SECRET_KEY // empty')
          if [ -z "$KEY" ] || [ "$KEY" = "null" ]; then
            echo "::error::could not resolve the service key from supabase status; available keys:"
            supabase status --output json | jq 'keys'
            exit 1
          fi
          export ITEST_SERVICE_ROLE_KEY="$KEY"
          npm run test:worker-integration

      - name: Dump serve log on failure
        if: failure()
        run: tail -200 /tmp/functions-serve.log || true

  # Catches Supabase migration-ledger drift at REVIEW time instead of at
  # deploy time on main. No `needs` — it starts the moment the PR run does
  # (~1 min: CLI setup + a dry-run push), so drift shows up as a red check
  # while the other jobs are still building. A red drift check also holds
  # the e2e gate (and therefore the preview deploy) closed, and blocks the
  # merge per the repo merge policy. On Dependabot PRs the steps no-op and
  # the job reports success (a job-level skip would hard-fail the e2e gate,
  # which treats non-excluded "skipped" checks as failures): dependabot
  # never writes migrations, and dependabot-triggered runs get Dependabot
  # secrets — not repo secrets — so the check could never link anyway.
  supabase-drift:
    name: Supabase Drift Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: actions/checkout@v7

      # Same pin as worker-integration: bump deliberately, not implicitly.
      - name: Setup Supabase CLI
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      - name: Drift check (dry-run push against prod ledger)
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: bash .github/scripts/supabase-deploy.sh check

  # Vercel deploys moved from the git integration into CI (vercel.json sets
  # git.deploymentEnabled: false) so a deployment only happens once the five
  # jobs above are green — not on every single commit. Previews deploy per
  # PR (superseded pushes are cancelled by the concurrency group first);
  # pushes to main deploy production. Remote build (`vercel deploy` without
  # --prebuilt) keeps build env/behavior identical to the old git-triggered
  # builds. The e2e job `needs` this, so the chain is:
  # checks → gate → deploy → live e2e against a commit that actually deploys.
  #
  # On push to main this job ALSO deploys Supabase first — drift check +
  # `db push` + bulk edge-function deploy (see supabase-deploy.sh) — as
  # ordered steps BEFORE the Vercel production deploy, so a failed migration
  # blocks the app deploy instead of shipping code whose schema never landed.
  # This replaces the manual post-merge "apply migrations, deploy functions"
  # chores from the README flow.
  #
  # PR deploys run the same e2e-gate as the e2e job first: no preview deploy
  # while Bugbot is NEUTRAL, any cross-workflow check is red, or a review
  # thread is unresolved. Unresolved threads fail the gate immediately —
  # resolve them, then re-run this job (e2e re-runs with it via `needs`).
  # worker-integration is in `needs` (not just the e2e job's) so the gate
  # never has to poll for it — its 25m ceiling would outlast the gate's 20m
  # timeout and fail the deploy on a job that was about to pass. With every
  # same-workflow job covered by `needs`, the gate poll only ever covers
  # cross-workflow checks (CodeQL, audit) and apps (Bugbot, GitGuardian).
  # The 30m budget = gate poll (≤20m) + the deploy itself.
  #
  # On Dependabot PRs every step no-ops and the job reports success — the
  # same pattern as supabase-drift above, for the same two reasons: (1)
  # dependabot-triggered runs get Dependabot secrets, not repo secrets, so
  # VERCEL_TOKEN is empty and the deploy step can only fail; (2) a job-level
  # skip would leave a "skipped" check run, which both the e2e gate and the
  # dependabot auto-merge's strict all-success evaluation treat as NOT
  # passing — so no Dependabot PR could ever auto-merge. Deploy coverage is
  # not lost: dependency bumps get their real deploy from the push-to-main
  # run right after the auto-merge.
  vercel-deploy:
    name: Vercel Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, typecheck, test, deno-check, security, worker-integration]
    permissions:
      contents: read
      pull-requests: write
      checks: read
      statuses: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: actions/checkout@v7

      # Push events (post-merge main) skip the PR-shaped gate: Bugbot and
      # review threads exist on the PR, which already enforced this pre-merge.
      - name: Wait for every other check to pass and all threads to resolve
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/e2e-gate.sh

      - name: Setup Supabase CLI
        if: github.event_name == 'push'
        uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      # Order matters: schema first, then functions, then the app build that
      # expects both. `db push` re-runs the same drift guard the PR check did.
      - name: Apply migrations + deploy edge functions
        if: github.event_name == 'push'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: bash .github/scripts/supabase-deploy.sh deploy

      - name: Deploy to Vercel
        id: deploy
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not available to this run — cannot deploy."
            exit 1
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            TARGET_FLAG="--prod"
            echo "target=production" >> "$GITHUB_OUTPUT"
          else
            TARGET_FLAG=""
            echo "target=preview" >> "$GITHUB_OUTPUT"
          fi
          URL=$(npx --yes vercel@latest deploy $TARGET_FLAG --yes --token "$VERCEL_TOKEN" | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"
          echo "### Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"

      # The git integration's bot comment is gone with auto-deploys; keep the
      # preview URL discoverable with one sticky (edited-in-place) PR comment.
      - name: Comment preview URL on the PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MARKER="<!-- ci-vercel-preview -->"
          BODY="$MARKER
          **Vercel preview** (deployed by CI after all checks passed): ${{ steps.deploy.outputs.url }} — commit ${{ github.event.pull_request.head.sha }}"
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --paginate -q ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$EXISTING" -f body="$BODY" > /dev/null
          else
            gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -f body="$BODY" > /dev/null
          fi

  # Live-AI end-to-end suite (tests/e2e/): real Gemini calls exercising the
  # reply-reasoning trailer round trip and full AiFlow executions where the
  # model makes the branch decisions — the contract class that unit tests
  # cannot cover (the Truly Insurance trailer leak of 2026-07-11 shipped
  # through 100%-coverage unit tests because only the live model mangles
  # markers).
  #
  # Runs LAST, twice-gated so the paid model calls fire only on an
  # otherwise-mergeable commit:
  #   1. `needs`: the five check jobs PLUS the Vercel deploy in THIS
  #      workflow (free, event-driven) — checks → deploy → e2e;
  #   2. the e2e-gate step: polls until every OTHER check on the SHA —
  #      cross-workflow (Analyze/CodeQL/audit) and app-reported (Cursor
  #      Bugbot, GitGuardian) — is literally SUCCESS (a NEUTRAL Bugbot
  #      means open findings and keeps the gate closed) AND every review
  #      thread is resolved. Unresolved threads fail the gate IMMEDIATELY
  #      (they can't self-resolve; re-run the job after resolving them).
  #      See .github/scripts/e2e-gate.sh.
  # Superseded pushes are cancelled by the workflow-level concurrency group.
  #
  # On Dependabot PRs every step no-ops and the job reports success (same
  # pattern and rationale as vercel-deploy above): dependabot-triggered runs
  # get Dependabot secrets — not repo secrets — so GOOGLE_API_KEY is empty
  # and the suite could never run, and a job-level skip would leave a
  # "skipped" check that blocks the strict auto-merge evaluation. The live
  # suite still covers dependency bumps on the push-to-main run post-merge.
  e2e:
    name: E2E (live AI + AiFlows)
    runs-on: ubuntu-latest
    # Budget: gate poll (≤20m) + npm ci (~1m) + live suite (~1m nominal,
    # up to ~15m if every serial test rode its full 120s timeout). 40m keeps
    # a worst-case gate from cancelling the job AFTER it opened — which
    # would burn the paid Gemini calls without recording a verdict.
    timeout-minutes: 40
    needs: [quality, typecheck, test, deno-check, security, vercel-deploy, worker-integration]
    permissions:
      contents: read
      checks: read
      statuses: read
      pull-requests: read
    steps:
      - name: Checkout
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: actions/checkout@v7

      # Push events (post-merge main) skip the PR-shaped gate: Bugbot/Vercel/
      # threads exist on the PR, which already enforced all of this pre-merge.
      - name: Wait for every other check to pass and all threads to resolve
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/e2e-gate.sh

      - name: Setup Node.js
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: npm ci

      - name: Run live e2e suite
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "::error::GOOGLE_API_KEY secret is not available to this run — the e2e suite cannot call Gemini."
            exit 1
          fi
          npm run test:e2e
