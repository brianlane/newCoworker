name: Dependabot auto-merge

# Strictly merges an eligible Dependabot PR only when EVERY check run for the
# head commit concluded "success" AND there are no unresolved review threads
# (e.g. Bugbot or human comments). Any failed / cancelled / timed_out / neutral
# / skipped / action_required check blocks the merge.
#
# Runs after CI finishes (workflow_run) so we never sit on an idle runner
# polling. If a check is still in progress when this fires, it exits quietly and
# is re-triggered when the next workflow completes.

on:
  workflow_run:
    workflows: ["CI", "CodeQL", "Dependency Audit"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    steps:
      - name: Evaluate checks and merge if all green
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REQUIRED_LABEL: dependabot-automerge
          # Checks to ignore in the strict evaluation:
          #   label-dependabot -> this repo's own automerge labeler job
          EXCLUDE_CHECKS: '["label-dependabot"]'
        run: |
          set -euo pipefail

          PR_NUMBER=$(gh pr list --repo "$REPO" --head "$HEAD_BRANCH" \
            --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for branch $HEAD_BRANCH; nothing to do."
            exit 0
          fi

          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json headRefOid,state,author,labels,isDraft)
          CUR_SHA=$(echo "$PR_JSON"   | jq -r '.headRefOid')
          STATE=$(echo "$PR_JSON"     | jq -r '.state')
          AUTHOR=$(echo "$PR_JSON"    | jq -r '.author.login')
          IS_DRAFT=$(echo "$PR_JSON"  | jq -r '.isDraft')
          HAS_LABEL=$(echo "$PR_JSON" | jq -r --arg l "$REQUIRED_LABEL" \
            'any(.labels[]?; .name == $l)')

          [ "$STATE" = "OPEN" ]       || { echo "PR #$PR_NUMBER is $STATE; skipping."; exit 0; }
          [ "$IS_DRAFT" = "false" ]   || { echo "PR #$PR_NUMBER is a draft; skipping."; exit 0; }
          [ "$AUTHOR" = "dependabot[bot]" ] || { echo "PR #$PR_NUMBER author is $AUTHOR; skipping."; exit 0; }
          [ "$HAS_LABEL" = "true" ]   || { echo "PR #$PR_NUMBER lacks '$REQUIRED_LABEL' label (likely a major update); skipping."; exit 0; }

          # Guard against a stale run: only act on checks for the current head.
          if [ "$CUR_SHA" != "$HEAD_SHA" ]; then
            echo "Stale run: PR head moved ($HEAD_SHA -> $CUR_SHA); skipping."
            exit 0
          fi

          echo "Evaluating check runs for $HEAD_SHA ..."
          CHECKS=$(gh api --paginate "repos/$REPO/commits/$HEAD_SHA/check-runs" \
            --jq '.check_runs[] | {name, status, conclusion}')

          FILTERED=$(echo "$CHECKS" | jq -c --argjson ex "$EXCLUDE_CHECKS" \
            'select((.name) as $n | ($ex | index($n)) | not)')

          if [ -z "$FILTERED" ]; then
            echo "No relevant check runs found; refusing to merge."
            exit 0
          fi

          echo "Relevant checks:"
          echo "$FILTERED" | jq -r '"  - \(.name): \(.status)/\(.conclusion // "n/a")"'

          INCOMPLETE=$(echo "$FILTERED" | jq -rc 'select(.status != "completed")')
          if [ -n "$INCOMPLETE" ]; then
            echo "Some checks are still running; will re-evaluate when they finish."
            exit 0
          fi

          # Strict gate: every remaining check must have concluded success.
          NOT_SUCCESS=$(echo "$FILTERED" | jq -rc 'select(.conclusion != "success")')
          if [ -n "$NOT_SUCCESS" ]; then
            echo "Strict gate failed -- the following checks are not green (success):"
            echo "$NOT_SUCCESS" | jq -r '"  - \(.name): \(.conclusion // "n/a")"'
            exit 0
          fi

          # Also honor any legacy commit statuses (non-check-run integrations).
          STATUS=$(gh api "repos/$REPO/commits/$HEAD_SHA/status" \
            --jq '{state: .state, total: .total_count}')
          STATUS_TOTAL=$(echo "$STATUS" | jq -r '.total')
          STATUS_STATE=$(echo "$STATUS" | jq -r '.state')
          if [ "$STATUS_TOTAL" -gt 0 ] && [ "$STATUS_STATE" != "success" ]; then
            echo "Commit statuses not all green (state=$STATUS_STATE); skipping."
            exit 0
          fi

          # Policy gate: no unresolved review threads (e.g. Bugbot / human comments).
          UNRESOLVED=$(gh api graphql -f query='
            query($owner:String!, $repo:String!, $pr:Int!) {
              repository(owner:$owner, name:$repo) {
                pullRequest(number:$pr) {
                  reviewThreads(first:100) { nodes { isResolved } }
                }
              }
            }' -F owner="${REPO%/*}" -F repo="${REPO#*/}" -F pr="$PR_NUMBER" \
            --jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false)] | length')
          if [ "$UNRESOLVED" -gt 0 ]; then
            echo "PR #$PR_NUMBER has $UNRESOLVED unresolved review thread(s); skipping per merge policy."
            exit 0
          fi

          echo "All checks green and no unresolved threads. Squash-merging PR #$PR_NUMBER."
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --delete-branch
