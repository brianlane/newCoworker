name: Main Failure Watch

# Why: a failed push-to-main CI run means PRODUCTION NEVER GOT THE DEPLOY
# (migrations, edge functions, and the Vercel app all ride the Vercel Deploy
# job), and before this workflow nothing retried or told anyone — the
# 2026-07-23 incident was a transient Supabase-CLI container error
# ("error running container: exit 135") that sat unnoticed until a human
# happened to look at the Actions tab.
#
# Policy, mirroring the nightly e2e's noise discipline:
#   - attempt 1 fails  → re-run ONLY the failed jobs automatically (plus
#     their dependents — GitHub re-runs the skipped downstream chain).
#     Transient runner/CLI blips self-heal with zero human involvement.
#   - attempt 2+ fails → the failure is real (it reproduced back-to-back on
#     fresh runners): email the admin with the run link. No further
#     auto-retries — retrying a real failure just delays the human.
#   - success at any point → silence.
#
# Scope: push-to-main runs of the CI workflow only. PR-run failures are
# excluded on purpose — they are watched by whoever is babysitting the PR
# (per the repo merge flow) and block nothing in production.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  actions: write

jobs:
  triage:
    name: Retry once, then alert
    # Only failed PUSH runs on main; everything else is out of scope.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Re-run failed jobs (attempt 1) or email the admin (attempt 2+)
        env:
          GH_TOKEN: ${{ github.token }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_TITLE: ${{ github.event.workflow_run.display_title }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$RUN_ATTEMPT" -lt 2 ]; then
            echo "push-to-main run $RUN_ID failed on attempt $RUN_ATTEMPT — re-running failed jobs (transient-blip policy)."
            gh api -X POST "repos/$REPO/actions/runs/$RUN_ID/rerun-failed-jobs"
            exit 0
          fi
          echo "push-to-main run $RUN_ID failed on attempt $RUN_ATTEMPT — real failure, emailing the admin."
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::warning::RESEND_API_KEY secret is not set — cannot email the admin. Set it (gh secret set RESEND_API_KEY) or watch the Actions tab."
            exit 0
          fi
          # The wording must match what ACTUALLY failed (Bugbot on PR #864):
          # the e2e job runs AFTER Vercel Deploy on push runs, so a run can
          # fail with production fully updated. Only claim a blocked deploy
          # when the Vercel Deploy job itself is among the failures; any
          # error listing jobs falls back to the blocked-deploy wording (the
          # scarier reading is the safe default for a human to verify).
          failed_jobs=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs?filter=latest" --paginate \
            -q '.jobs[] | select(.conclusion == "failure") | .name' 2>/dev/null | sort -u) || failed_jobs=""
          if [ -z "$failed_jobs" ] || printf '%s\n' "$failed_jobs" | grep -qx "Vercel Deploy"; then
            SUBJECT="Main deploy FAILED twice — production did not update: $RUN_TITLE"
            DETAIL="Until this run is green, production has NOT received this merge: pending migrations, edge functions, and the Vercel app deploy are all blocked (they ride the Vercel Deploy job)."
          else
            SUBJECT="Main CI FAILED twice after deploy: $RUN_TITLE"
            DETAIL="The Vercel Deploy job succeeded — production IS updated — but a post-deploy job failed twice: $(printf '%s' "$failed_jobs" | tr '\n' ',' | sed 's/,$//; s/,/, /g'). Treat a failed live e2e here as a possible AI regression that just shipped."
          fi
          BODY=$(jq -n --arg url "$RUN_URL" --arg subject "$SUBJECT" --arg detail "$DETAIL" '{
            from: "New Coworker <contact@newcoworker.com>",
            to: ["team@newcoworker.com"],
            subject: $subject,
            text: ("The push-to-main CI run failed, was automatically re-run once, and failed again — this is a real failure, not a runner blip.\n\nRun: " + $url + "\n\n" + $detail + " Read the failed job log, fix or revert, and re-run.\n\n— CI (main-failure-watch.yml)")
          }')
          curl -fsS https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" > /dev/null && echo "Failure email sent to team@newcoworker.com" || \
            echo "::warning::Failure email could not be sent (Resend API error) — check the Actions tab."
