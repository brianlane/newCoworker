# Per-tenant chat-worker. One instance per VPS, pinned to the same
# Docker network as Rowboat so it can reach `http://rowboat:3000`
# without exposing Rowboat to the internet.
#
# Provisioned by vps/scripts/deploy-client.sh. The .env file written
# by that script provides BUSINESS_ID, ROWBOAT_PROJECT_ID,
# ROWBOAT_GATEWAY_TOKEN, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY.

services:
  chat-worker:
    build: .
    image: chat-worker:local
    container_name: chat-worker
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - rowboat_default
    # Owner-rule memory capture (worker.mjs) calls the host's Ollama at
    # http://host.docker.internal:11434, exactly like the llm-router does.
    # Ollama binds 0.0.0.0:11434 and UFW allows the docker bridge subnet
    # (see bootstrap.sh); this extra_host resolves host.docker.internal to
    # the docker bridge gateway so the container can reach it.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Knowledge-graph projection: the platform's vault sync unpacks entity
    # notes + graph.jsonl into /opt/rowboat/memory (graph-mode tenants);
    # the worker compiles graph.jsonl into graph.db (node:sqlite) in place.
    # The sync chowns the dir to uid 1000 (`node`) so this write works.
    volumes:
      - /opt/rowboat/memory:/opt/rowboat/memory
    # Keep logs bounded — structured JSON, ~150 bytes/line, but a busy
    # tenant could otherwise fill disk inside a year.
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  rowboat_default:
    external: true
