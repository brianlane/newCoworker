# Dev/reference: Ollama runs in Compose. Production (bootstrap) uses systemd Ollama on the host and
# Rowboat with extra_hosts host.docker.internal:host-gateway + PROVIDER_BASE_URL=http://host.docker.internal:11434
version: "3.9"
services:
  rowboat:
    image: ghcr.io/rowboatlabs/rowboat:latest
    container_name: rowboat
    environment:
      ROWBOAT_GATEWAY_TOKEN: ${ROWBOAT_GATEWAY_TOKEN:-mock_rowboat_gateway_token}
      PROVIDER_BASE_URL: http://ollama:11434
      PROVIDER_API_KEY: ollama
      PROVIDER_DEFAULT_MODEL: ${OLLAMA_MODEL:-phi4-mini:3.8b}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /opt/rowboat/vault:/vault:ro
      - /opt/rowboat/memory:/memory
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    container_name: rowboat-mongo
    volumes:
      - rowboat_mongo:/data/db

  redis:
    image: redis:7-alpine
    container_name: rowboat-redis

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

volumes:
  rowboat_mongo:
  ollama_models:
