# Reference routing intent (legacy YAML shape). Production Bifrost is maximhq/bifrost
# (see https://github.com/maximhq/bifrost). Docker network variant: Ollama hostname `ollama`.

providers:
  - id: ollama
    base_url: http://ollama:11434
    type: ollama
    fallback_models:
      - phi4-mini:3.8b

routes:
  - name: all_tasks
    when: true
    model: phi4-mini:3.8b

fallback:
  ifBusy: phi4-mini:3.8b

server:
  port: 8080
  host: 0.0.0.0
