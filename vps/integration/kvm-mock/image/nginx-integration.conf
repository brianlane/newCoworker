# In-container nginx: Rowboat :3000/health and Bifrost :8080/health (same URLs as heartbeat.sh).
# Ollama listens on :11434 in the same container.
# daemon is set via `nginx -g "daemon off;"` in entrypoint.sh (do not duplicate here).
worker_processes 1;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;
events {
  worker_connections 1024;
}
http {
  access_log off;
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server {
    listen 3000;
    location /health {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
  server {
    listen 8080;
    location /health {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}
