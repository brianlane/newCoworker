# Exactly one container: KVM 2 (starter) — 2 CPU / 8 GiB total (Hostinger KVM 2 SKU).
# Inside: Ollama (bootstrap.sh §4 env) + nginx on :3000 and :8080 for Rowboat/Bifrost /health (heartbeat.sh).
# Host ports: Rowboat 13000, Bifrost 18080, Ollama 11134

name: kvm2-mock

services:
  kvm2:
    build:
      context: ../kvm-mock/image
      dockerfile: Dockerfile
    image: newcoworker-kvm-mock:local
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OMP_NUM_THREADS: "2"
      OLLAMA_KV_CACHE_TYPE: q4_0
      OLLAMA_FLASH_ATTENTION: "1"
    ports:
      - "127.0.0.1:13000:3000"
      - "127.0.0.1:18080:8080"
      - "127.0.0.1:11134:11434"
    volumes:
      - kvm2_ollama:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 8G
        reservations:
          cpus: "0.25"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:3000/health && curl -sf http://127.0.0.1:8080/health && curl -sf http://127.0.0.1:11434/api/tags"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

volumes:
  kvm2_ollama:
