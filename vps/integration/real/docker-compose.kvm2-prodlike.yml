# Prod-like topology for integration: no in-compose Ollama; Rowboat/Bifrost reach Ollama via host.docker.internal.
# Default host port 11435 avoids clashing with a host Ollama on 11434 (override INTEGRATION_PRODLIKE_OLLAMA_HOST_PORT).

name: kvm2-prodlike-int

networks:
  integration:
    driver: bridge

services:
  bifrost:
    image: maximhq/bifrost:latest
    restart: "no"
    networks: [integration]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:18100:8080"
    volumes:
      - bifrost_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 45s

  mongo:
    image: mongo:7
    restart: "no"
    networks: [integration]
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: "no"
    networks: [integration]

  rowboat:
    build:
      context: https://github.com/rowboatlabs/rowboat.git#f7e6f783baa98a929880ce1f537481bc7d4f3415:apps/rowboat
      dockerfile: Dockerfile
    image: rowboat-integration:local
    restart: "no"
    networks: [integration]
    env_file: ./fixtures/rowboat.env.kvm2-prodlike.integration
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROWBOAT_GATEWAY_TOKEN: ${ROWBOAT_GATEWAY_TOKEN:-integration_test_token}
      PROVIDER_BASE_URL: http://host.docker.internal:${INTEGRATION_PRODLIKE_OLLAMA_HOST_PORT:-11435}
      PROVIDER_DEFAULT_MODEL: ${OLLAMA_MODEL:-phi4-mini:3.8b}
      PROVIDER_COPILOT_MODEL: ${OLLAMA_MODEL:-phi4-mini:3.8b}
    ports:
      - "127.0.0.1:13100:3000"
    volumes:
      - ./fixtures/vault:/vault:ro
      - rowboat_memory:/memory
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1536m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status>=200&&r.status<500?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 300s

volumes:
  mongo_data:
  redis_data:
  bifrost_data:
  rowboat_memory:
