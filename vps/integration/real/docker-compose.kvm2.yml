# Real stack for integration tests — starter (KVM 2) resource profile.
# Rowboat: build from public GitHub at ref pinned in rowboat-git-ref (not floating main).
# + Ollama + Mongo + Redis (same logical probes as heartbeat.sh).

name: kvm2-int

networks:
  integration:
    driver: bridge

services:
  ollama:
    image: ollama/ollama:latest
    restart: "no"
    networks: [integration]
    ports:
      - "127.0.0.1:11134:11434"
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OMP_NUM_THREADS: "2"
      OLLAMA_KV_CACHE_TYPE: q4_0
      OLLAMA_FLASH_ATTENTION: "1"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 25
      start_period: 60s

  mongo:
    image: mongo:7
    restart: "no"
    networks: [integration]
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: "no"
    networks: [integration]

  rowboat:
    build:
      context: https://github.com/rowboatlabs/rowboat.git#f7e6f783baa98a929880ce1f537481bc7d4f3415:apps/rowboat
      dockerfile: Dockerfile
    image: rowboat-integration:local
    restart: "no"
    networks: [integration]
    env_file: ./fixtures/rowboat.env.kvm2.integration
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROWBOAT_GATEWAY_TOKEN: ${ROWBOAT_GATEWAY_TOKEN:-integration_test_token}
      PROVIDER_DEFAULT_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      PROVIDER_COPILOT_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    ports:
      - "127.0.0.1:13000:3000"
    volumes:
      - ./fixtures/vault:/vault:ro
      - rowboat_memory:/memory
    depends_on:
      ollama:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          # Agent + Next need headroom above slim defaults; integration runs real inference.
          memory: 3072m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status>=200&&r.status<500?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 300s

volumes:
  mongo_data:
  redis_data:
  ollama_data:
  rowboat_memory:
