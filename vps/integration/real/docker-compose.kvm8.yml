# Real stack for integration tests — standard (KVM 8) resource profile.
# Same Rowboat git pin as kvm2; adds jobs-worker + qdrant like bootstrap.sh standard tier.

name: kvm8-int

networks:
  integration:
    driver: bridge

services:
  ollama:
    image: ollama/ollama:latest
    restart: "no"
    networks: [integration]
    ports:
      - "127.0.0.1:21134:11434"
    environment:
      OLLAMA_NUM_PARALLEL: "3"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OMP_NUM_THREADS: "8"
      OLLAMA_KV_CACHE_TYPE: q4_0
      OLLAMA_FLASH_ATTENTION: "1"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 32G
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 25
      start_period: 60s

  bifrost:
    image: maximhq/bifrost:latest
    restart: "no"
    networks: [integration]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "127.0.0.1:28080:8080"
    volumes:
      - bifrost_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 45s

  mongo:
    image: mongo:7
    restart: "no"
    networks: [integration]
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: "no"
    networks: [integration]

  qdrant:
    image: qdrant/qdrant:latest
    restart: "no"
    networks: [integration]
    volumes:
      - qdrant_data:/qdrant/storage

  rowboat:
    build:
      context: https://github.com/rowboatlabs/rowboat.git#f7e6f783baa98a929880ce1f537481bc7d4f3415:apps/rowboat
      dockerfile: Dockerfile
    image: rowboat-integration-web:local
    restart: "no"
    networks: [integration]
    env_file: ./fixtures/rowboat.env.kvm8.integration
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROWBOAT_GATEWAY_TOKEN: ${ROWBOAT_GATEWAY_TOKEN:-integration_test_token}
      PROVIDER_DEFAULT_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      PROVIDER_COPILOT_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
    ports:
      - "127.0.0.1:23000:3000"
    volumes:
      - ./fixtures/vault:/vault:ro
      - rowboat_memory:/memory
    depends_on:
      ollama:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1536m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status>=200&&r.status<500?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 300s

  jobs-worker:
    build:
      context: https://github.com/rowboatlabs/rowboat.git#f7e6f783baa98a929880ce1f537481bc7d4f3415:apps/rowboat
      dockerfile: scripts.Dockerfile
    image: rowboat-integration-jobs:local
    restart: "no"
    networks: [integration]
    env_file: ./fixtures/rowboat.env.kvm8.integration
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROWBOAT_GATEWAY_TOKEN: ${ROWBOAT_GATEWAY_TOKEN:-integration_test_token}
      PROVIDER_DEFAULT_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      PROVIDER_COPILOT_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
    command: ["npm", "run", "jobs-worker"]
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1536m

volumes:
  mongo_data:
  redis_data:
  ollama_data:
  bifrost_data:
  rowboat_memory:
  qdrant_data:
