# Optional: run the media bridge beside Rowboat on the customer VPS.
# Copy `.env` with STREAM_URL_SIGNING_SECRET, SUPABASE_*, GOOGLE_API_KEY, BUSINESS_ID (optional), BRIDGE_MEDIA_WSS_ORIGIN host must match Telnyx stream URL.
#
# Network topology: the bridge MUST attach to `rowboat_default` (the network
# defined by /opt/rowboat/docker-compose.yml) so it can reach `rowboat:3000`
# and `llm-router:11435` by Docker DNS. Going via `host.docker.internal:3000`
# does NOT work in production: rowboat publishes 127.0.0.1:3000 only, so
# packets from a sibling container hit the host's docker-bridge IP — where
# nothing is listening — and time out. (May 2026 outage: bridge accepted the
# WebSocket from Telnyx, opened Gemini Live, then sat silent because every
# Rowboat tool/turn fetch hung 30s before failing.)
services:
  voice-bridge:
    build: .
    ports:
      - "${VOICE_BRIDGE_PUBLISH_PORT:-8090}:8090"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - default
      - rowboat_default
    volumes:
      - /opt/rowboat/vault:/vault:ro
    environment:
      - VAULT_PATH=${VAULT_PATH:-/vault}
      # Default to the in-network DNS name; override only if Rowboat is on
      # a different host. `host.docker.internal:3000` is intentionally NOT
      # the default — see header comment.
      - ROWBOAT_URL=${ROWBOAT_URL:-http://rowboat:3000}
      - ROWBOAT_GATEWAY_TOKEN=${ROWBOAT_GATEWAY_TOKEN:-}
      - APP_BASE_URL=${APP_BASE_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Container user is pinned to non-root in the Dockerfile; don't override here.
    # read_only FS + tmpfs for any scratch writes keeps the blast radius tight if the
    # process is compromised. tsx caches to node_modules/.tsx which is baked into the
    # image, so no writable /app is needed at runtime.
    read_only: true
    tmpfs:
      - /tmp:size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  # `default` is created by compose for this stack as
  # `voice-bridge_default`. We still declare it so adding `rowboat_default`
  # below doesn't drop it.
  default:
  # External network owned by the Rowboat compose stack; must already exist
  # on the host (deploy-client.sh brings up Rowboat first, which creates it).
  rowboat_default:
    external: true
